[pytest]
testpaths = tests
timeout = 60

markers =
    slow: tests that take more than 30 seconds
    batman: batman-adv specific tests
    connectivity: mesh network connectivity tests
    node: per-node health tests

# SSH commands can be slow — give generous per-test timeout
# Override per-test with @pytest.mark.timeout(N)
addopts = --tb=short -q
