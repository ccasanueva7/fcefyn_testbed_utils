# OpenWrt One PoC — fragmento para scrape_config_files
#
# Cada archivo en scrape_config_files debe tener la clave raíz scrape_configs:
# (no una lista suelta de jobs; ver promtool / upstream).
#
# Ansible copia este archivo a /etc/prometheus/jobs.d/openwrt-one.yml y declara
# scrape_config_files en /etc/prometheus/prometheus.yml.
#
# Métricas vía túnel SSH: dut-metrics-tunnel-openwrt-one.service → 127.0.0.1:19100
#
# En el DUT (una vez):
#   opkg install prometheus-node-exporter-lua prometheus-node-exporter-lua-openwrt
#   uci set prometheus-node-exporter-lua.main.listen_interface='loopback'
#   uci commit prometheus-node-exporter-lua
#   /etc/init.d/prometheus-node-exporter-lua enable && /etc/init.d/prometheus-node-exporter-lua start

scrape_configs:
  - job_name: 'openwrt-one'
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ['127.0.0.1:19100']
        labels:
          dut: 'openwrt-one'
          firmware: 'openwrt-24.10.5'
          target: 'mediatek-filogic'
