<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 680" width="100%">
  <defs>
    <linearGradient id="bgRingGradient" x1="120" y1="100" x2="560" y2="580" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#102f29"/>
      <stop offset="100%" stop-color="#081513"/>
    </linearGradient>

    <linearGradient id="innerFillGradient" x1="170" y1="120" x2="520" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#29c7a4"/>
      <stop offset="100%" stop-color="#17856f"/>
    </linearGradient>

    <linearGradient id="routerGrad" x1="182" y1="446" x2="504" y2="528" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34404d"/>
      <stop offset="100%" stop-color="#212a34"/>
    </linearGradient>

    <linearGradient id="signalGradOuter" x1="145" y1="78" x2="535" y2="205" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#b6fff0"/>
      <stop offset="100%" stop-color="#76d9c4"/>
    </linearGradient>

    <linearGradient id="signalGradMid" x1="185" y1="102" x2="495" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#93e8d8"/>
      <stop offset="100%" stop-color="#5fbba7"/>
    </linearGradient>

    <linearGradient id="signalGradInner" x1="225" y1="122" x2="455" y2="165" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d6fff7"/>
      <stop offset="100%" stop-color="#97d9cb"/>
    </linearGradient>

    <radialGradient id="screenGlow" cx="50%" cy="44%" r="62%">
      <stop offset="0%" stop-color="rgba(255,255,255,.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Fondo -->
  <circle cx="340" cy="340" r="310" fill="url(#bgRingGradient)"/>
  <circle cx="340" cy="340" r="284" fill="url(#innerFillGradient)"/>

  <!-- Brillo -->
  <ellipse cx="300" cy="156" rx="180" ry="90" fill="rgba(255,255,255,0.08)"/>

  <!-- WiFi: arcos más juntos -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- outer -->
    <path d="M 145 182 A 195 195 0 0 0 535 182"
          stroke="#0a1013" stroke-width="26"/>
    <path d="M 145 182 A 195 195 0 0 0 535 182"
          stroke="url(#signalGradOuter)" stroke-width="21"/>

    <!-- middle -->
    <path d="M 185 155 A 155 155 0 0 0 495 155"
          stroke="#0a1013" stroke-width="26"/>
    <path d="M 185 155 A 155 155 0 0 0 495 155"
          stroke="url(#signalGradMid)" stroke-width="21"/>

    <!-- inner -->
    <path d="M 225 128 A 115 115 0 0 0 455 128"
          stroke="#0a1013" stroke-width="26"/>
    <path d="M 225 128 A 115 115 0 0 0 455 128"
          stroke="url(#signalGradInner)" stroke-width="21"/>

    <!-- dot -->
    <circle cx="340" cy="100" r="20" fill="#0a1013"/>
    <circle cx="340" cy="100" r="14" fill="#d7fff8"/>
  </g>

  <!-- Router: un poco más grande -->
  <g transform="translate(340 470) scale(1.08) translate(-340 -470)">
    <!-- sombras antenas -->
    <line x1="250" y1="447" x2="220" y2="372"
          stroke="#0a1013" stroke-width="13" stroke-linecap="round"/>
    <line x1="430" y1="447" x2="460" y2="372"
          stroke="#0a1013" stroke-width="13" stroke-linecap="round"/>

    <!-- antenas -->
    <line x1="252" y1="444" x2="224" y2="374"
          stroke="#2a3641" stroke-width="9" stroke-linecap="round"/>
    <line x1="428" y1="444" x2="456" y2="374"
          stroke="#2a3641" stroke-width="9" stroke-linecap="round"/>

    <!-- joints -->
    <circle cx="252" cy="444" r="7" fill="#12181d"/>
    <circle cx="428" cy="444" r="7" fill="#12181d"/>

    <!-- sombra -->
    <rect x="174" y="440" width="332" height="84" rx="22" fill="#0a1013" opacity=".38"/>

    <!-- cuerpo -->
    <rect x="176" y="432" width="328" height="82" rx="20"
          fill="url(#routerGrad)" stroke="#12181d" stroke-width="8"/>

    <!-- highlight -->
    <path d="M200 450 C240 440, 440 440, 478 450"
          fill="none" stroke="rgba(255,255,255,.26)" stroke-width="5" stroke-linecap="round"/>

    <!-- LEDs -->
    <circle cx="228" cy="475" r="8" fill="#ef5b4c"/>
    <circle cx="258" cy="475" r="8" fill="#e1b534"/>
    <circle cx="288" cy="475" r="8" fill="#44d26a"/>

    <!-- línea -->
    <path d="M214 498 H324" stroke="#596877" stroke-width="6" stroke-linecap="round"/>

    <!-- puertos -->
    <rect x="394" y="463" width="34" height="25" rx="5"
          fill="#172028" stroke="#718394" stroke-width="2.4"/>
    <rect x="439" y="463" width="34" height="25" rx="5"
          fill="#172028" stroke="#718394" stroke-width="2.4"/>

    <!-- glow -->
    <ellipse cx="340" cy="440" rx="118" ry="24" fill="url(#screenGlow)" opacity=".22"/>
  </g>
</svg>