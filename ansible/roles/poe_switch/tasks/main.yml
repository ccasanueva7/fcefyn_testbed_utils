---
# Role: poe_switch
# Installs poe_switch_control.py and the labgrid-switch-abstraction package
# for PoE power control of DUTs via TP-Link managed switch.
# Required by PDUDaemon (openwrt-tests playbook_labgrid.yml) for fcefyn-poe-port1/port2.

- name: Install netmiko for switch SSH (apt avoids PEP 668 externally-managed-environment)
  ansible.builtin.apt:
    name: python3-netmiko
    state: present
    update_cache: yes

- name: Install labgrid-switch-abstraction package
  ansible.builtin.pip:
    name: "git+https://github.com/fcefyn-testbed/labgrid-switch-abstraction.git"
    state: present
    extra_args: --break-system-packages

- name: Copy poe_switch_control.py to /usr/local/bin
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../scripts/switch/poe_switch_control.py"
    dest: /usr/local/bin/poe_switch_control.py
    mode: "0755"
